<!DOCTYPE html>
<html lang="de">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080e; --surface: rgba(255,255,255,0.02);
      --border: rgba(255,255,255,0.07); --text: #e2e8f0;
      --muted: #64748b; --dim: #475569; --faint: #334155;

    body { background: var(--bg); color: var(--text); font-family: 'DM Sans','Segoe UI',sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
    .container { max-width: 520px; margin: 0 auto; }
    .eyebrow { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; line-height: 1.2; }
    .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .progress-wrap { margin: 20px 0; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-label { font-size: 11px; color: var(--muted); }
    .progress-value { font-size: 11px; color: #f1f5f9; font-weight: 700; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg,#4ade80,#60a5fa,#f87171,#fbbf24); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
    .phase-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .phase-pill { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 10px; border: 1px solid transparent; }
    .phase-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .week-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-bottom: 20px; }
    .week-btn { padding: 7px 2px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); color: var(--dim); font-size: 11px; font-family: 'DM Mono',monospace; cursor: pointer; transition: all 0.15s; position: relative; text-align: center; font-weight: 400; }
    .week-btn .weigh-dot { position: absolute; top: -2px; right: -2px; width: 5px; height: 5px; border-radius: 50%; background: #fbbf24; }
    .week-card { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid transparent; }
    .week-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .week-phase-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
    .week-title { font-weight: 700; font-size: 15px; color: #f1f5f9; }
    .week-focus { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .week-stats { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .week-stat { font-size: 11px; }
    .check-btn { padding: 6px 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; font-family: 'DM Sans',sans-serif; }
    .days-list { display: flex; flex-direction: column; gap: 7px; }
    .day-row { display: flex; gap: 10px; align-items: flex-start; padding: 11px 13px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; position: relative; }
    .day-row:hover { filter: brightness(1.15); }
    .day-row.done { opacity: 0.45; }
    .day-row.done .day-strecke { text-decoration: line-through; }
    .day-check { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0; transition: opacity 0.15s; }
    .day-row.done .day-check { opacity: 1; }
    .day-label { min-width: 28px; font-weight: 700; font-size: 12px; padding-top: 1px; }
    .day-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .day-strecke { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
    .day-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .nav-btns { display: flex; gap: 8px; margin-top: 16px; }
    .nav-btn { flex: 1; padding: 11px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); color: #94a3b8; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans',sans-serif; }
    .nav-btn:disabled { color: var(--faint); cursor: default; }
    .nav-btn.next { font-weight: 600; }
    .footer-card { margin-top: 20px; padding: 14px 16px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); }
    .footer-eyebrow { font-size: 10px; color: var(--faint); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .footer-items { font-size: 12px; color: var(--dim); line-height: 1.9; }
    .lauf-bg  { background: rgba(74,222,128,0.10); border-color: rgba(74,222,128,0.30); }
    .gehen-bg { background: rgba(148,163,184,0.07); border-color: rgba(148,163,184,0.18); }
    .pause-bg { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); }
    .dot-lauf  { background: #4ade80; }
    .dot-gehen { background: #94a3b8; }
    .dot-pause { background: #475569; }
    .reset-btn { font-size: 10px; color: var(--faint); background: none; border: none; cursor: pointer; font-family: 'DM Sans',sans-serif; padding: 4px 0; text-decoration: underline; margin-top: 10px; display: block; }
    .reset-btn:hover { color: #f87171; }
  </style>
</head>
<body>
<div class="container">
  <div style="margin-bottom:20px">
    <div class="eyebrow">24-Wochen Plan</div>
    <h1>Von 105 kg zum Ziel</h1>
    <p class="subtitle">4,5 km → 7,2 km → 9,1 km komplett &nbsp;·&nbsp; ~85–90 kg Zielgewicht</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Gesamtfortschritt</span>
      <span class="progress-value" id="progressText">0/24 Wochen · 0%</span>
    </div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="phase-legend" id="phaseLegend"></div>
  <div class="week-grid" id="weekGrid"></div>

  <div class="week-card" id="weekCard">
    <div class="week-card-top">
      <div>
        <div class="week-phase-label" id="cardPhase"></div>
        <div class="week-title" id="cardTitle"></div>
        <div class="week-focus" id="cardFocus"></div>
      </div>
      <button class="check-btn" id="checkBtn" onclick="toggleWeek()">Abhaken</button>
    </div>
    <div class="week-stats" id="cardStats"></div>
  </div>

  <div class="days-list" id="daysList"></div>

  <div class="nav-btns">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Vorherige</button>
    <button class="nav-btn next" id="btnNext" onclick="navigate(1)">Nächste →</button>
  </div>

  <div class="footer-card">
    <div class="footer-eyebrow">Täglich</div>
    <div class="footer-items">
      🥚 2 Eier + Banane zum Frühstück<br>
      🥣 Protein Overnight Oats zum Mittag<br>
      💧 Nur Wasser trinken<br>
      ⚖️ Jeden Mittwoch nüchtern wiegen
    </div>
    <button class="reset-btn" onclick="resetAll()">Alle Fortschritte zurücksetzen</button>
  </div>
</div>

// ── State ──────────────────────────────────────────────
let activeWeek = 0;

function loadState() {
  try {
    return {
      completedWeeks: JSON.parse(localStorage.getItem('tp_weeks') || '[]'),
      completedDays:  JSON.parse(localStorage.getItem('tp_days')  || '{}')
    };
  } catch(e) { return { completedWeeks: [], completedDays: {} }; }
}
function saveState() {
  localStorage.setItem('tp_weeks', JSON.stringify(state.completedWeeks));
  localStorage.setItem('tp_days',  JSON.stringify(state.completedDays));
}
let state = loadState();

// day key: "w{weekIdx}_d{dayIdx}"
function dayKey(w, d) { return `w${w}_d${d}`; }

function toggleWeek() {
  const i = state.completedWeeks.indexOf(activeWeek);
  if (i === -1) state.completedWeeks.push(activeWeek);
  else state.completedWeeks.splice(i, 1);
  saveState(); render();
}
function toggleDay(weekIdx, dayIdx) {
  const k = dayKey(weekIdx, dayIdx);
  if (state.completedDays[k]) delete state.completedDays[k];
  else state.completedDays[k] = true;
  saveState(); buildDays();
  // auto-check week if all days done
  const w = allWeeks[weekIdx];
  const allDone = w.days.every((_,i) => state.completedDays[dayKey(weekIdx,i)]);
  const wDone = state.completedWeeks.includes(weekIdx);
  if (allDone && !wDone) { state.completedWeeks.push(weekIdx); saveState(); buildWeekGrid(); buildWeekCard(); updateProgress(); }
  else if (!allDone && wDone) { state.completedWeeks.splice(state.completedWeeks.indexOf(weekIdx),1); saveState(); buildWeekGrid(); buildWeekCard(); updateProgress(); }
}
function resetAll() {
  if (!confirm('Alle Fortschritte zurücksetzen?')) return;
  state = { completedWeeks: [], completedDays: {} };
  saveState(); render();
}

// ── Helpers ────────────────────────────────────────────
function hex2rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Render ─────────────────────────────────────────────
function buildPhaseLegend() {
  document.getElementById('phaseLegend').innerHTML = phases.map(p => {
    const c = phaseColors[p];
    return `<div class="phase-pill" style="background:${hex2rgba(c,.07)};border-color:${hex2rgba(c,.25)}">
      <div class="phase-dot" style="background:${c}"></div>
      <span style="color:${c}">${p}</span></div>`;
  }).join('');
}

function buildWeekGrid() {
  document.getElementById('weekGrid').innerHTML = allWeeks.map((w, i) => {
    const isActive = i === activeWeek;
    const isDone   = state.completedWeeks.includes(i);
    const c        = phaseColors[w.phase];
    const isWeigh  = weighInWeeks.includes(w.week);
    const border   = isActive ? c : isDone ? hex2rgba(c,.4) : 'rgba(255,255,255,0.07)';
    const bg       = isActive ? hex2rgba(c,.12) : isDone ? hex2rgba(c,.06) : 'rgba(255,255,255,0.02)';
    const color    = isActive ? c : isDone ? hex2rgba(c,.7) : '#475569';
    const fw       = isActive ? 700 : 400;
    const label    = isDone ? '✓' : `W${w.week}`;
    const dot      = (isWeigh && !isDone) ? `<div class="weigh-dot"></div>` : '';
    return `<button class="week-btn" onclick="setWeek(${i})"
      style="border-color:${border};background:${bg};color:${color};font-weight:${fw}">${label}${dot}</button>`;
  }).join('');
}

function buildWeekCard() {
  const w    = allWeeks[activeWeek];
  const c    = phaseColors[w.phase];
  const isDone = state.completedWeeks.includes(activeWeek);
  const isWeigh = weighInWeeks.includes(w.week);
  document.getElementById('weekCard').style.cssText = `background:${hex2rgba(c,.07)};border-color:${hex2rgba(c,.2)}`;
  document.getElementById('cardPhase').textContent  = w.phase;
  document.getElementById('cardPhase').style.color  = c;
  document.getElementById('cardTitle').textContent  = `Woche ${w.week}`;
  document.getElementById('cardFocus').textContent  = w.focus;
  const btn = document.getElementById('checkBtn');
  btn.textContent        = isDone ? '✓ Erledigt' : 'Abhaken';
  btn.style.borderColor  = isDone ? c : 'rgba(255,255,255,0.12)';
  btn.style.background   = isDone ? hex2rgba(c,.15) : 'transparent';
  btn.style.color        = isDone ? c : '#64748b';
  document.getElementById('cardStats').innerHTML =
    `<span class="week-stat" style="color:#4ade80">🏃 ${w.lauftage}× Laufen</span>
     <span class="week-stat" style="color:#94a3b8">🚶 ${w.gehtage}× Gehen</span>
     <span class="week-stat" style="color:#475569">😴 ${w.ruhetage}× Pause</span>
     ${isWeigh ? '<span class="week-stat" style="color:#fbbf24">⚖️ Wiegetag</span>' : ''}`;
}

function buildDays() {
  const w = allWeeks[activeWeek];
  const c = phaseColors[w.phase];
  const labelColor = { lauf: c, gehen: '#94a3b8', pause: '#334155' };
  document.getElementById('daysList').innerHTML = w.days.map((d, i) => {
    const k     = dayKey(activeWeek, i);
    const done  = !!state.completedDays[k];
    const bgCls = d.type + '-bg';
    return `<div class="day-row ${bgCls}${done?' done':''}" onclick="toggleDay(${activeWeek},${i})">
      <div class="day-label" style="color:${labelColor[d.type]}">${d.day}</div>
      <div class="day-dot dot-${d.type}"></div>
      <div style="flex:1;padding-right:20px">
        <div class="day-strecke">${d.strecke}</div>
        <div class="day-note">${d.note}</div>
      </div>
      <div class="day-check" style="color:${c}">✓</div>
    </div>`;
  }).join('');
}

function buildNav() {
  const c    = phaseColors[allWeeks[activeWeek].phase];
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  prev.disabled    = activeWeek === 0;
  prev.style.color = activeWeek === 0 ? '#2d3748' : '#94a3b8';
  next.disabled    = activeWeek === 23;
  next.style.borderColor = activeWeek < 23 ? hex2rgba(c,.35) : 'rgba(255,255,255,0.07)';
  next.style.background  = activeWeek < 23 ? hex2rgba(c,.10) : 'rgba(255,255,255,0.02)';
  next.style.color       = activeWeek < 23 ? c : '#475569';
}

function updateProgress() {
  const n   = state.completedWeeks.length;
  const pct = Math.round(n / 24 * 100);
  document.getElementById('progressText').textContent = `${n}/24 Wochen · ${pct}%`;
  document.getElementById('progressBar').style.width  = pct + '%';
}

function render() {
  buildWeekGrid(); buildWeekCard(); buildDays(); buildNav(); updateProgress();
}

function setWeek(i)    { activeWeek = i; render(); }
function navigate(dir) { const n = activeWeek + dir; if (n >= 0 && n < 24) { activeWeek = n; render(); } }

// Init
buildPhaseLegend();
render();
</script>
